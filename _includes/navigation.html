<!-- (A) MENU WRAPPER -->
<nav id="hamnav">
  <!-- (B) THE HAMBURGER -->
  <label for="hamburger">
    <svg viewBox="0 0 100 45" width="40" height="25">
      <rect width="100" height="5"></rect>
      <rect y="20" width="100" height="5"></rect>
      <rect y="40" width="100" height="5"></rect>
    </svg>
  </label>
  <input type="checkbox" id="hamburger"/>
 
  <div id="hamitems">
    {% for item in site.data.navigation %}
      <a class="nav-menu-item" {% if page.url == item.link %} id="current-page" {% endif %} href="{{ item.link }}">
        {{ item.name }}
      </a>
    {% endfor %}
  </div>
</nav>
