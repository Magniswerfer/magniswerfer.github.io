---
layout: default
title: Blog
---
<h1>Blog</h1>

{% for category in site.categories %}
  <ul>
    {% for post in category[1] %}
      {% if category[0] == "blog" %}
        <li>
          <h2><a href="{{ post.url }}">{{ post.title}} - {{post.date | date_to_string}}</a></h2>
          {{ post.excerpt }}
        </li>
      {% endif %}
    {% endfor %}
  </ul>
{% endfor %}
